# Continuous Integration workflow for the RentalOps backend.
#
# Runs on every push and pull request that touches the backend source.
# Two phases:
#   1. compile  — fast feedback, no Docker needed
#   2. test     — full Maven verify with Testcontainers (requires Docker on the runner)

name: CI

on:
  push:
    branches: ["main", "develop", "feature/**", "fix/**"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # -----------------------------------------------------------------------
  # Phase 1: fast compile check (no Docker needed)
  # -----------------------------------------------------------------------
  compile:
    name: Compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Compile (skip tests)
        run: ./mvnw -DskipTests compile

  # -----------------------------------------------------------------------
  # Phase 2: full test suite with Testcontainers
  # Docker is available by default on ubuntu-latest runners.
  # -----------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: compile

    # APP_JWT_SECRET must be at least 32 characters for the JWT library.
    # The value here is used only inside the ephemeral CI runner.
    env:
      APP_JWT_SECRET: ci-local-secret-do-not-use-outside-ci-pipeline

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw verify

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

