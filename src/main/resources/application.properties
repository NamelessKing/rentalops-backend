spring.config.import=optional:file:./env.properties

spring.application.name=rentalops-backend
server.port=${PORT:${SERVER_PORT:8080}}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/rentalops}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.properties.hibernate.format_sql=true

# JSON serialization
# All timestamp fields in this application use java.time.Instant, which Jackson
# serialises as an ISO-8601 string with UTC "Z" suffix (e.g. "2026-03-11T10:00:00Z").
# No explicit write-dates-as-timestamps override is needed with Jackson 3.x.
# spring.jackson.time-zone is kept as a defence-in-depth measure for any legacy
# java.util.Date values that may appear in third-party library payloads (e.g. JWT claims).
spring.jackson.time-zone=UTC

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

logging.level.org.springframework.security=INFO

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:PT8H}
