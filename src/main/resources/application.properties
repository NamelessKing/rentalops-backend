spring.config.import=optional:file:./env.properties

spring.application.name=rentalops-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/rentalops}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

# JSON serialization
# Without this, Jackson serializes LocalDateTime as a numeric array [2026,3,11,10,0]
# instead of a readable ISO-8601 string. This affects all endpoints that return
# timestamp fields - currently only the issuereports module (createdAt, reviewedAt).
# LocalDateTime produces "2026-03-11T10:00:00" (no Z suffix) because it is
# timezone-agnostic by Java design. All timestamps in this application are produced
# and consumed as UTC by convention. spring.jackson.time-zone affects only legacy
# java.util.Date types, not LocalDateTime - it is included as a defense-in-depth
# measure for any future use of the old date API (e.g. JWT claims, audit logs).
# Migrating to Instant (which produces the Z suffix) is a post-MVP task.
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

logging.level.org.springframework.security=INFO

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:PT8H}
