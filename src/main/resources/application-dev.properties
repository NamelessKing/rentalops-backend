# The dev profile is intentionally more permissive than the default one:
# - SQL is visible in logs
# - Hibernate can update the schema locally
#
# This is convenient for local work, but it is not the reference behavior for
# every environment. The safer shared baseline stays in application.properties.
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
