# Tests get their own tiny profile for two reasons:
# 1. they should not depend on the developer's local secret values
# 2. they should remain compatible with Testcontainers-provided database settings
#
# Testcontainers starts a fresh empty PostgreSQL container for each test run.
# create-drop tells Hibernate to build the schema from JPA entities at startup
# and tear it down at the end, so tests are always working with a known-clean state.
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never

app.jwt.secret=test-secret-key-test-secret-key-test-secret-key
app.jwt.expiration=PT30M
