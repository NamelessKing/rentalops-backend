# Tests get their own tiny profile for two reasons:
# 1. they should not depend on the developer's local secret values
# 2. they should remain compatible with Testcontainers-provided database settings
#
# In other words, local dev configuration and automated test configuration are
# intentionally separated, even in this small foundation setup.
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never

app.jwt.secret=test-secret-key-test-secret-key-test-secret-key
app.jwt.expiration=PT30M
