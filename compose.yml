# Local development Docker Compose for RentalOps backend.
#
# Starts a PostgreSQL 16 container that matches the default connection
# settings in env.properties.example.  The backend itself is NOT included
# here: run it separately with ./mvnw spring-boot:run (or from your IDE).
#
# Usage:
#   docker compose up -d        # start the database in the background
#   docker compose down         # stop and remove the container
#   docker compose down -v      # also delete the persistent volume

services:
  postgres:
    image: postgres:16-alpine
    container_name: rentalops-postgres
    environment:
      POSTGRES_DB: rentalops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - rentalops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rentalops"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  rentalops_postgres_data:
    driver: local

